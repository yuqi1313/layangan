<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Layangan</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; font-family: system-ui, sans-serif; }
body { background: #f0f0f0; max-width: 480px; margin: 0 auto; min-height: 100vh; }
.topbar { background: #e65c00; color: white; padding: 16px 20px; font-size: 18px; font-weight: 700; }
.tabs { display: flex; background: white; border-bottom: 2px solid #e65c00; }
.tab { flex: 1; padding: 12px; text-align: center; font-weight: 700; font-size: 13px; color: #999; cursor: pointer; }
.tab.on { color: #e65c00; border-bottom: 3px solid #e65c00; margin-bottom: -2px; }
.page { display: none; padding: 16px; }
.page.on { display: block; }
.card { background: white; border-radius: 12px; padding: 16px; margin-bottom: 12px; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
.row { display: flex; justify-content: space-between; align-items: center; }
.nama { font-weight: 700; font-size: 15px; }
.sub { color: #888; font-size: 13px; margin-top: 2px; }
.stok-num { font-size: 22px; font-weight: 900; color: #e65c00; }
.btn-row { display: flex; gap: 8px; margin-top: 10px; }
button { border: none; border-radius: 8px; padding: 10px 16px; font-weight: 700; cursor: pointer; font-size: 14px; }
.btn-o { background: #e65c00; color: white; flex: 1; }
.btn-g { background: #00b894; color: white; flex: 1; }
.btn-r { background: #d63031; color: white; }
.btn-gray { background: #eee; color: #333; flex: 1; }
input, select { width: 100%; padding: 12px; border: 1.5px solid #ddd; border-radius: 8px; font-size: 15px; margin-top: 6px; }
label { font-size: 13px; font-weight: 700; color: #555; display: block; margin-top: 12px; }
.total-box { background: #fff3e0; border-radius: 10px; padding: 14px; text-align: center; margin: 12px 0; }
.total-box .big { font-size: 24px; font-weight: 900; color: #e65c00; }
.hutang-card { background: white; border-radius: 12px; padding: 14px; margin-bottom: 10px; border-left: 4px solid #d63031; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
.lunas-btn { background: #00b894; color: white; border: none; border-radius: 6px; padding: 8px 14px; font-weight: 700; font-size: 13px; cursor: pointer; }
.empty { text-align: center; color: #aaa; padding: 40px 0; font-size: 15px; }
.fab { position: fixed; bottom: 24px; right: 24px; width: 54px; height: 54px; background: #e65c00; color: white; border-radius: 50%; font-size: 28px; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 12px rgba(230,92,0,0.4); cursor: pointer; border: none; }
.overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 10; align-items: flex-end; }
.overlay.on { display: flex; }
.sheet { background: white; width: 100%; border-radius: 20px 20px 0 0; padding: 24px 20px 32px; }
.sheet h3 { font-size: 17px; margin-bottom: 4px; }
.toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: #333; color: white; padding: 10px 22px; border-radius: 20px; font-size: 14px; font-weight: 600; display: none; z-index: 99; }
.sum-bar { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
.sum-item { background: white; border-radius: 10px; padding: 12px; text-align: center; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
.sum-item .val { font-size: 17px; font-weight: 900; }
.sum-item .lbl { font-size: 11px; color: #888; margin-top: 2px; }
</style>
</head>
<body>

<div class="topbar">&#x1FA81; Catatan Layangan</div>

<div class="tabs">
  <div class="tab on" onclick="showTab('stok',this)">&#x1F4E6; Stok</div>
  <div class="tab" onclick="showTab('jual',this)">&#x1F6D2; Jual</div>
  <div class="tab" onclick="showTab('tagihan',this)">&#x1F4B0; Tagihan</div>
</div>

<!-- STOK -->
<div id="pg-stok" class="page on">
  <div id="list-stok"><div class="empty">Memuat...</div></div>
</div>

<!-- JUAL -->
<div id="pg-jual" class="page">
  <div class="card">
    <label>Pilih Layangan</label>
    <select id="j-item"></select>
    <label>Jumlah</label>
    <input type="number" id="j-qty" value="1" min="1">
    <label>Nama Pembeli</label>
    <input type="text" id="j-nama" placeholder="Contoh: Budi (opsional)">
    <div class="total-box" id="j-total-box">
      <div style="font-size:13px;color:#888">Total tagihan</div>
      <div class="big" id="j-total">Rp 0</div>
    </div>
    <button class="btn-o" style="width:100%;padding:14px;font-size:16px" onclick="simpanJual()">&#x1F4BE; Simpan</button>
  </div>
</div>

<!-- TAGIHAN -->
<div id="pg-tagihan" class="page">
  <div class="sum-bar">
    <div class="sum-item"><div class="val" id="t-total" style="color:#d63031">Rp 0</div><div class="lbl">Belum Dibayar</div></div>
    <div class="sum-item"><div class="val" id="t-lunas" style="color:#00b894">Rp 0</div><div class="lbl">Sudah Dibayar</div></div>
  </div>
  <div id="list-tagihan"><div class="empty">Memuat...</div></div>
</div>

<!-- FAB tambah layangan -->
<button class="fab" id="fab" onclick="openSheet()">+</button>

<!-- Sheet tambah layangan -->
<div class="overlay" id="overlay" onclick="closeSheet()">
  <div class="sheet" onclick="event.stopPropagation()">
    <h3>&#x2795; Tambah Layangan</h3>
    <label>Nama Layangan</label>
    <input type="text" id="s-nama" placeholder="Contoh: Layangan Naga">
    <label>Harga Modal (Rp)</label>
    <input type="number" id="s-harga" placeholder="25000">
    <label>Stok Awal</label>
    <input type="number" id="s-stok" placeholder="0" value="0">
    <div class="btn-row" style="margin-top:16px">
      <button class="btn-gray" onclick="closeSheet()">Batal</button>
      <button class="btn-o" onclick="tambahLayangan()">Simpan</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SURL = "https://xjqkaykrlqtvrbjxgzxm.supabase.co";
const SKEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhqcWtheWtybHF0dnJianhnenhtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzNzg3OTUsImV4cCI6MjA5MTk1NDc5NX0.poSeoWokR5BW7Y_0gmUYEahZ3Cs4Kri_-J5WP1vrT4I";
let sb, items = [];
const $ = id => document.getElementById(id);
const rp = n => "Rp " + Number(n).toLocaleString('id-ID');

function toast(msg) {
  const t = $('toast');
  t.innerText = msg;
  t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 2500);
}

window.onload = () => {
  const init = () => {
    if (window.supabase) {
      sb = window.supabase.createClient(SURL, SKEY);
      load();
    } else {
      setTimeout(init, 100);
    }
  };
  init();
};

async function load() {
  const { data } = await sb.from('layangans').select('*').order('nama');
  items = data || [];
  renderStok();
  renderJualDrop();
  await renderTagihan();
}

function renderStok() {
  if (!items.length) {
    $('list-stok').innerHTML = '<div class="empty">Belum ada layangan.<br>Tap + untuk tambah.</div>';
    return;
  }
  $('list-stok').innerHTML = items.map(l => `
    <div class="card">
      <div class="row">
        <div><div class="nama">${l.nama}</div><div class="sub">${rp(l.harga)} / buah</div></div>
        <div class="stok-num">${l.stok}</div>
      </div>
      <div class="btn-row" style="margin-top:10px;align-items:center">
        <button onclick="ubahQty(${l.id},-1)" style="background:#eee;color:#333;padding:10px 14px;font-size:18px;flex:none">&#x2212;</button>
        <input type="number" id="qty-jual-${l.id}" value="1" min="1" max="${l.stok}"
          style="width:60px;text-align:center;font-weight:900;font-size:16px;padding:8px;margin-top:0;flex:none">
        <button onclick="ubahQty(${l.id},1)" style="background:#eee;color:#333;padding:10px 14px;font-size:18px;flex:none">&#x2B;</button>
        <button class="btn-r" style="background:#e67e22;flex:1" onclick="jualDariStok(${l.id})">&#x1F6D2; Jual</button>
        <button class="btn-r" onclick="hapusLayangan(${l.id})" style="padding:10px 12px;flex:none">&#x1F5D1;</button>
      </div>
    </div>`).join('');
}

function renderJualDrop() {
  $('j-item').innerHTML = '<option value="">-- Pilih --</option>' +
    items.map(l => `<option value="${l.id}" data-harga="${l.harga}">${l.nama} (${rp(l.harga)})</option>`).join('');
  $('j-item').onchange = hitungTotal;
  $('j-qty').oninput = hitungTotal;
}

function hitungTotal() {
  const opt = $('j-item').selectedOptions[0];
  const harga = opt ? parseInt(opt.dataset.harga) || 0 : 0;
  const qty = parseInt($('j-qty').value) || 0;
  $('j-total').innerText = rp(harga * qty);
}

async function simpanJual() {
  const sel = $('j-item');
  const id = sel.value;
  const qty = parseInt($('j-qty').value);
  const nama = $('j-nama').value.trim() || '-';
  const l = items.find(x => x.id == id);
  if (!id || !qty || !l) { toast('Pilih layangan & isi jumlah!'); return; }
  if (l.stok < qty) { toast('Stok tidak cukup! Stok: ' + l.stok); return; }
  const total = qty * l.harga;
  await sb.from('transaksis').insert({ layangan_id: id, layangan_nama: l.nama, qty, harga: l.harga, total, nama_pembeli: nama, status: 'belum' });
  await sb.from('layangans').update({ stok: l.stok - qty }).eq('id', id);
  toast('&#x2705; Tersimpan! Tagihan: ' + rp(total));
  $('j-qty').value = 1;
  $('j-nama').value = '';
  sel.value = '';
  $('j-total').innerText = 'Rp 0';
  load();
}

async function renderTagihan() {
  const { data } = await sb.from('transaksis').select('*').order('created_at', { ascending: false });
  const semua = data || [];
  const belum = semua.filter(x => x.status == 'belum');
  const sudah = semua.filter(x => x.status == 'lunas');
  $('t-total').innerText = rp(belum.reduce((a, b) => a + b.total, 0));
  $('t-lunas').innerText = rp(sudah.reduce((a, b) => a + b.total, 0));
  if (!semua.length) {
    $('list-tagihan').innerHTML = '<div class="empty">Belum ada transaksi.</div>';
    return;
  }
  $('list-tagihan').innerHTML = semua.map(t => `
    <div class="hutang-card" style="border-left-color:${t.status == 'lunas' ? '#00b894' : '#d63031'}">
      <div class="row">
        <div>
          <div class="nama">${t.nama_pembeli || '-'}</div>
          <div class="sub">${t.layangan_nama} &times; ${t.qty} = ${rp(t.total)}</div>
          <div class="sub" style="font-size:11px;color:#bbb">${new Date(t.created_at).toLocaleDateString('id-ID', { day: 'numeric', month: 'short', year: 'numeric' })}</div>
        </div>
        ${t.status == 'belum'
          ? `<button class="lunas-btn" onclick="tandaiLunas(${t.id})">Lunas</button>`
          : `<span style="color:#00b894;font-weight:700;font-size:13px">&#x2713; Lunas</span>`}
      </div>
    </div>`).join('');
}

async function tandaiLunas(id) {
  await sb.from('transaksis').update({ status: 'lunas' }).eq('id', id);
  toast('&#x2705; Ditandai lunas!');
  load();
}

function ubahQty(id, delta) {
  const input = document.getElementById('qty-jual-' + id);
  const l = items.find(x => x.id === id);
  let val = parseInt(input.value) || 1;
  val = Math.max(1, Math.min(l.stok, val + delta));
  input.value = val;
}

async function jualDariStok(id) {
  const l = items.find(x => x.id === id);
  const qty = parseInt(document.getElementById('qty-jual-' + id).value) || 1;
  if (l.stok < qty) { toast('Stok tidak cukup! Stok: ' + l.stok); return; }
  const total = l.harga * qty;
  await sb.from('transaksis').insert({ layangan_id: id, layangan_nama: l.nama, qty, harga: l.harga, total, nama_pembeli: '-', status: 'belum' });
  await sb.from('layangans').update({ stok: l.stok - qty }).eq('id', id);
  toast('&#x2705; Terjual ' + qty + '! Tagihan: ' + rp(total));
  load();
}

async function hapusLayangan(id) {
  if (!confirm('Hapus layangan ini?')) return;
  await sb.from('layangans').delete().eq('id', id);
  load();
}

async function tambahLayangan() {
  const nama = $('s-nama').value.trim();
  const harga = parseInt($('s-harga').value);
  const stok = parseInt($('s-stok').value) || 0;
  if (!nama || !harga) { toast('Isi nama & harga!'); return; }
  await sb.from('layangans').insert({ nama, harga, stok });
  toast('&#x2705; Layangan ditambah!');
  closeSheet();
  $('s-nama').value = '';
  $('s-harga').value = '';
  $('s-stok').value = '0';
  load();
}

function showTab(t, el) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('on'));
  document.querySelectorAll('.tab').forEach(b => b.classList.remove('on'));
  $('pg-' + t).classList.add('on');
  el.classList.add('on');
  $('fab').style.display = t === 'stok' ? 'flex' : 'none';
  if (t === 'tagihan') renderTagihan();
}

function openSheet() { $('overlay').classList.add('on'); }
function closeSheet() { $('overlay').classList.remove('on'); }
</script>
</body>
</html>
