<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catatan Layangan</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#e65c00">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Layangan">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; font-family: system-ui, sans-serif; }
body { background: #f0f0f0; max-width: 480px; margin: 0 auto; min-height: 100vh; }
.topbar { background: #e65c00; color: white; padding: 16px 20px; font-size: 18px; font-weight: 700; }
.tabs { display: flex; background: white; border-bottom: 2px solid #e65c00; }
.tab { flex: 1; padding: 12px; text-align: center; font-weight: 700; font-size: 13px; color: #999; cursor: pointer; }
.tab.on { color: #e65c00; border-bottom: 3px solid #e65c00; margin-bottom: -2px; }
.page { display: none; padding: 16px; padding-bottom: 120px; }
.page.on { display: block; }
.card { background: white; border-radius: 12px; padding: 16px; margin-bottom: 12px; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
.nama { font-weight: 700; font-size: 15px; }
.sub { color: #888; font-size: 13px; margin-top: 2px; }
.stok-num { font-size: 22px; font-weight: 900; color: #e65c00; min-width: 36px; text-align: right; }
.row { display: flex; justify-content: space-between; align-items: center; }
button { border: none; border-radius: 8px; padding: 10px 16px; font-weight: 700; cursor: pointer; font-size: 14px; }
.btn-o { background: #e65c00; color: white; }
.btn-r { background: #d63031; color: white; }
.btn-gray { background: #eee; color: #333; }
input, select { width: 100%; padding: 12px; border: 1.5px solid #ddd; border-radius: 8px; font-size: 15px; margin-top: 6px; }
label { font-size: 13px; font-weight: 700; color: #555; display: block; margin-top: 12px; }
.btn-jual { background: linear-gradient(135deg, #e65c00, #f9a825); color: white; border: none; border-radius: 24px; padding: 10px 18px; font-size: 14px; font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: 6px; box-shadow: 0 3px 8px rgba(230,92,0,0.35); transition: transform 0.1s, box-shadow 0.1s; flex-shrink: 0; }
.btn-jual:active { transform: scale(0.93); box-shadow: 0 1px 4px rgba(230,92,0,0.2); }
.btn-jual:disabled { background: #ddd; color: #aaa; box-shadow: none; cursor: not-allowed; }
.hutang-card { background: white; border-radius: 12px; padding: 14px; margin-bottom: 10px; border-left: 4px solid #d63031; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
.lunas-btn { background: #00b894; color: white; border: none; border-radius: 6px; padding: 8px 14px; font-weight: 700; font-size: 13px; cursor: pointer; flex-shrink: 0; }
.empty { text-align: center; color: #aaa; padding: 40px 0; font-size: 15px; }
.fab { position: fixed; bottom: 24px; right: 24px; width: 54px; height: 54px; background: #e65c00; color: white; border-radius: 50%; font-size: 28px; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 12px rgba(230,92,0,0.4); cursor: pointer; border: none; }
.overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 10; align-items: flex-end; }
.overlay.on { display: flex; }
.sheet { background: white; width: 100%; border-radius: 20px 20px 0 0; padding: 24px 20px 32px; }
.sheet h3 { font-size: 17px; margin-bottom: 4px; }
.btn-row { display: flex; gap: 8px; margin-top: 16px; }
.toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: #333; color: white; padding: 10px 22px; border-radius: 20px; font-size: 14px; font-weight: 600; display: none; z-index: 99; }
.sum-bar { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
.sum-item { background: white; border-radius: 10px; padding: 12px; text-align: center; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
.sum-item .val { font-size: 17px; font-weight: 900; }
.sum-item .lbl { font-size: 11px; color: #888; margin-top: 2px; }
.stok-form { background: white; border-radius: 12px; padding: 16px; margin-bottom: 12px; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
.install-banner { display:none; position:fixed; bottom:0; left:50%; transform:translateX(-50%); width:100%; max-width:480px; background:white; border-top:3px solid #e65c00; padding:14px 20px; z-index:50; box-shadow:0 -4px 16px rgba(0,0,0,0.12); align-items:center; gap:12px; }
.install-banner.on { display:flex; }
.install-banner .ib-text { flex:1; font-size:13px; color:#333; }
.install-banner .ib-text b { display:block; font-size:14px; margin-bottom:2px; }
.install-banner .ib-btn { background:#e65c00; color:white; border:none; border-radius:10px; padding:10px 16px; font-weight:700; font-size:13px; cursor:pointer; white-space:nowrap; }
.install-banner .ib-close { background:none; border:none; font-size:20px; color:#aaa; cursor:pointer; padding:4px; }
.lightbox { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.88); z-index:100; flex-direction:column; align-items:center; justify-content:center; padding:24px; }
.lightbox.on { display:flex; }
.lightbox img { max-width:100%; max-height:70vh; border-radius:16px; object-fit:contain; box-shadow:0 8px 32px rgba(0,0,0,0.5); }
.lightbox .lb-nama { color:white; font-size:20px; font-weight:900; margin-top:20px; text-align:center; }
.lightbox .lb-harga { color:#f9a825; font-size:15px; margin-top:6px; }
.lightbox .lb-close { position:absolute; top:20px; right:20px; background:rgba(255,255,255,0.15); border:none; color:white; font-size:24px; width:44px; height:44px; border-radius:50%; cursor:pointer; display:flex; align-items:center; justify-content:center; }
.bottom-nav { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 20px; background: white; border-radius: 50px; padding: 16px 40px; box-shadow: 0 4px 16px rgba(0,0,0,0.15); z-index: 50; width: 90%; max-width: 480px; justify-content: center; }
.nav-item { padding: 14px 24px; border-radius: 50px; font-weight: 700; cursor: pointer; background: #f0f0f0; color: #333; font-size: 15px; transition: all 0.3s; }
.nav-item.on { background: #e65c00; color: white; box-shadow: 0 4px 12px rgba(230,92,0,0.5); font-size: 16px; font-weight: 900; }
</style>
</head>
<body>

<div class="topbar">&#x1FA81; Catatan Layangan</div>

<div class="bottom-nav">
  <div class="nav-item on" onclick="showTab('jual',this)">🛒 Jual</div>
  <div class="nav-item" onclick="showTab('stok',this)">📦 Stok</div>
  <div class="nav-item" onclick="showTab('tagihan',this)">💰 Tagihan</div>
</div>

<!-- JUAL -->
<div id="pg-jual" class="page on">
  <div id="list-jual"><div class="empty">Memuat...</div></div>
</div>

<!-- STOK -->
<div id="pg-stok" class="page">
  <div class="stok-form">
    <h3 style="font-size:15px;margin-bottom:4px">&#x2795; Tambah Stok</h3>
    <label>Pilih Layangan</label>
    <select id="ts-item"></select>
    <label>Jumlah Tambah</label>
    <input type="number" id="ts-qty" value="1" min="1">
    <button class="btn-o" style="width:100%;margin-top:14px;padding:13px;font-size:15px" onclick="tambahStok()">&#x2705; Tambah Stok</button>
  </div>
  <div id="list-stok"><div class="empty">Memuat...</div></div>
</div>

<!-- TAGIHAN -->
<div id="pg-tagihan" class="page">
  <div class="sum-bar">
    <div class="sum-item"><div class="val" id="t-total" style="color:#d63031">Rp 0</div><div class="lbl">Belum Dibayar</div></div>
    <div class="sum-item"><div class="val" id="t-lunas" style="color:#00b894">Rp 0</div><div class="lbl">Sudah Dibayar</div></div>
  </div>
  <button id="btn-bayar-semua" onclick="bayarSemua()" style="display:none;width:100%;padding:13px;font-size:15px;font-weight:700;background:linear-gradient(135deg,#00b894,#00cec9);color:white;border:none;border-radius:12px;margin-bottom:14px;cursor:pointer;box-shadow:0 3px 8px rgba(0,184,148,0.35)">&#x2705; Bayar Semua Tagihan</button>
  <div id="toggle-lunas-wrap" style="display:none;text-align:right;margin-bottom:8px">
    <span onclick="toggleLunas()" id="toggle-lunas-btn" style="font-size:13px;color:#00b894;font-weight:700;cursor:pointer">&#x1F4C2; Lihat Riwayat Lunas</span>
  </div>
  <div id="list-tagihan"><div class="empty">Memuat...</div></div>
</div>

<!-- FAB tambah jenis layangan baru -->
<button class="fab" id="fab" style="display:none" onclick="openSheet()">+</button>

<!-- Sheet tambah jenis layangan baru -->
<div class="overlay" id="overlay" onclick="closeSheet()">
  <div class="sheet" onclick="event.stopPropagation()">
    <h3>&#x2795; Tambah Jenis Layangan</h3>
    <label>Nama Layangan</label>
    <input type="text" id="s-nama" placeholder="Contoh: Layangan Naga">
    <label>Harga Jual (Rp)</label>
    <input type="number" id="s-harga" placeholder="25000">
    <label>Stok Awal</label>
    <input type="number" id="s-stok" placeholder="0" value="0">
    <label>Foto Layangan (opsional)</label>
    <div style="margin-top:8px;display:flex;align-items:center;gap:12px">
      <div id="s-foto-preview" onclick="document.getElementById('s-foto-input').click()"
        style="width:64px;height:64px;border-radius:10px;background:#f5e6d3;display:flex;align-items:center;justify-content:center;font-size:28px;border:2px dashed #e65c00;cursor:pointer;flex-shrink:0;overflow:hidden">
        &#x1F4F7;
      </div>
      <span style="font-size:13px;color:#888">Tap untuk pilih foto dari HP</span>
    </div>
    <input type="file" id="s-foto-input" accept="image/*" style="display:none">
    <div class="btn-row">
      <button class="btn-gray" style="flex:1" onclick="closeSheet()">Batal</button>
      <button class="btn-o" style="flex:1" onclick="tambahLayangan()">Simpan</button>
    </div>
  </div>
</div>

<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <button class="lb-close" onclick="closeLightbox()">&#x2715;</button>
  <img id="lb-img" src="">
  <div class="lb-nama" id="lb-nama"></div>
  <div class="lb-harga" id="lb-harga"></div>
</div>

<div class="install-banner" id="install-banner">
  <div style="font-size:28px">&#x1FA81;</div>
  <div class="ib-text">
    <b>Pasang ke Layar Utama</b>
    Buka seperti aplikasi, tanpa browser
  </div>
  <button class="ib-btn" id="install-btn">Pasang</button>
  <button class="ib-close" onclick="tutupBanner()">&#x2715;</button>
</div>

<div class="toast" id="toast"></div>

<script>
const SURL = "https://xjqkaykrlqtvrbjxgzxm.supabase.co";
const SKEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhqcWtheWtybHF0dnJianhnenhtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzNzg3OTUsImV4cCI6MjA5MTk1NDc5NX0.poSeoWokR5BW7Y_0gmUYEahZ3Cs4Kri_-J5WP1vrT4I";

// === KONFIGURASI NOTIF TELEGRAM (isi sendiri, jangan share ke siapapun) ===
const TG_TOKEN = "8645708862:AAEqRs_CknBSQ0QYkTstG5o_gYlyiPaU194";   // dari @BotFather
const TG_CHAT_ID = "5370804782";   // Chat ID HP kamu
// =========================================================================
let sb, items = [];
let uploadedPhotoUrl = null;
const $ = id => document.getElementById(id);
const rp = n => "Rp " + Number(n).toLocaleString('id-ID');

function toast(msg) {
  const t = $('toast');
  t.innerText = msg;
  t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 2500);
}

window.onload = () => {
  const init = () => {
    if (window.supabase) {
      sb = window.supabase.createClient(SURL, SKEY);
      load();
    } else {
      setTimeout(init, 100);
    }
  };
  init();
};

async function load() {
  const { data } = await sb.from('layangans').select('*').order('nama');
  items = data || [];
  renderJual();
  renderStokList();
  renderStokDrop();
  await renderTagihan();
}

// TAB JUAL — tiap layangan ada tombol − untuk jual 1
function renderJual() {
  if (!items.length) {
    $('list-jual').innerHTML = '<div class="empty">Belum ada layangan.</div>';
    return;
  }
  $('list-jual').innerHTML = items.map(l => `
    <div class="card">
      <div class="row">
        <div style="display:flex;align-items:center;gap:12px;flex:1;min-width:0">
          ${l.foto_url
            ? `<img src="${l.foto_url}" onclick="bukaFoto('${l.foto_url}','${l.nama}','${rp(l.harga)}')" style="width:48px;height:48px;border-radius:10px;object-fit:cover;flex-shrink:0;cursor:zoom-in;box-shadow:0 2px 6px rgba(0,0,0,0.15)">`
            : `<div style="width:48px;height:48px;border-radius:10px;background:#f5e6d3;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0">&#x1FA81;</div>`}
          <div>
            <div class="nama">${l.nama}</div>
            <div class="sub">${rp(l.harga)} / buah</div>
          </div>
        </div>
        <div style="display:flex;align-items:center;gap:12px">
          <div class="stok-num">${l.stok}</div>
          <button class="btn-jual" onclick="jualSatu(${l.id})" ${l.stok < 1 ? 'disabled' : ''}>&#x1F6D2; Terjual</button>
        </div>
      </div>
    </div>`).join('');
}

// TAB STOK — daftar stok saat ini + tombol hapus
function renderStokList() {
  if (!items.length) {
    $('list-stok').innerHTML = '<div class="empty">Belum ada layangan.<br>Tap + untuk tambah jenis baru.</div>';
    return;
  }
  $('list-stok').innerHTML = '<div style="font-size:12px;color:#aaa;margin-bottom:8px;font-weight:700">STOK SAAT INI</div>' +
    items.map(l => `
    <div class="card" style="padding:12px 16px" id="stok-card-${l.id}">
      <div class="row" style="align-items:flex-start;gap:10px">
        <div style="cursor:pointer;flex-shrink:0" onclick="gantiPhoto(${l.id})" title="Tap untuk ganti foto">
          ${l.foto_url
            ? `<img src="${l.foto_url}" style="width:52px;height:52px;border-radius:10px;object-fit:cover;border:2px solid #e65c00">`
            : `<div style="width:52px;height:52px;border-radius:10px;background:#f5e6d3;display:flex;align-items:center;justify-content:center;font-size:26px;border:2px dashed #e65c00">&#x1FA81;</div>`}
          <div style="font-size:10px;color:#e65c00;text-align:center;margin-top:3px;font-weight:700">Ganti</div>
        </div>
        <div style="flex:1;min-width:0">
          <div class="nama" id="nama-text-${l.id}">${l.nama}</div>
          <div class="sub" id="harga-text-${l.id}">${rp(l.harga)} / buah</div>
          <!-- Form edit (tersembunyi) -->
          <div id="edit-form-${l.id}" style="display:none;margin-top:8px">
            <input type="text" id="edit-nama-${l.id}" value="${l.nama}"
              style="padding:7px 10px;font-size:14px;font-weight:700;margin-top:0;margin-bottom:6px;border-radius:8px">
            <div style="display:flex;align-items:center;gap:6px">
              <span style="font-size:12px;color:#888;white-space:nowrap">Rp</span>
              <input type="number" id="edit-harga-${l.id}" value="${l.harga}" min="0"
                style="padding:7px 10px;font-size:14px;font-weight:700;margin-top:0;border-radius:8px">
            </div>
            <div style="display:flex;gap:6px;margin-top:8px">
              <button onclick="simpanEdit(${l.id})" style="flex:1;background:#e65c00;color:white;border:none;border-radius:8px;padding:8px;font-size:13px;font-weight:700;cursor:pointer">&#x2705; Simpan</button>
              <button onclick="batalEdit(${l.id})" style="flex:1;background:#eee;color:#333;border:none;border-radius:8px;padding:8px;font-size:13px;font-weight:700;cursor:pointer">Batal</button>
            </div>
          </div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:center;gap:8px">
          <div class="stok-num">${l.stok}</div>
          <button onclick="bukaEdit(${l.id})" id="edit-btn-${l.id}" style="background:#f0f0f0;color:#555;border:none;border-radius:8px;padding:6px 10px;font-size:12px;font-weight:700;cursor:pointer">&#x270F;&#xFE0F; Edit</button>
          <button class="btn-r" onclick="hapusLayangan(${l.id})" style="padding:6px 10px;font-size:12px">&#x1F5D1;</button>
        </div>
      </div>
    </div>`).join('');
}

function bukaEdit(id) {
  $(`edit-form-${id}`).style.display = 'block';
  $(`edit-btn-${id}`).style.display = 'none';
  $(`nama-text-${id}`).style.display = 'none';
  $(`harga-text-${id}`).style.display = 'none';
}

function batalEdit(id) {
  $(`edit-form-${id}`).style.display = 'none';
  $(`edit-btn-${id}`).style.display = 'block';
  $(`nama-text-${id}`).style.display = 'block';
  $(`harga-text-${id}`).style.display = 'block';
}

async function simpanEdit(id) {
  const nama = document.getElementById(`edit-nama-${id}`).value.trim();
  const harga = parseInt(document.getElementById(`edit-harga-${id}`).value);
  if (!nama || isNaN(harga) || harga < 0) { toast('Data tidak valid!'); return; }
  await sb.from('layangans').update({ nama, harga }).eq('id', id);
  toast('✅ Disimpan!');
  load();
}

function renderStokDrop() {
  $('ts-item').innerHTML = items.map(l =>
    `<option value="${l.id}">${l.nama} (stok: ${l.stok})</option>`
  ).join('');
}

async function tambahStok() {
  const id = $('ts-item').value;
  const qty = parseInt($('ts-qty').value);
  const l = items.find(x => x.id == id);
  if (!id || !qty || qty < 1 || !l) { toast('Pilih layangan & isi jumlah!'); return; }
  await sb.from('layangans').update({ stok: l.stok + qty }).eq('id', id);
  toast('✅ Stok ' + l.nama + ' +' + qty);
  $('ts-qty').value = 1;
  load();
}

async function kirimNotif(nama, harga, stokSisa) {
  if (!TG_TOKEN || TG_TOKEN.includes('ISI_')) return;
  const msg = `🪁 Layangan Terjual!\n\n📦 ${nama}\n💰 ${rp(harga)}\n📉 Sisa stok: ${stokSisa}`;
  fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendMessage`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ chat_id: TG_CHAT_ID, text: msg })
  });
}

async function jualSatu(id) {
  const l = items.find(x => x.id === id);
  if (!l || l.stok < 1) { toast('Stok habis!'); return; }
  await sb.from('transaksis').insert({ layangan_id: id, layangan_nama: l.nama, qty: 1, harga: l.harga, total: l.harga, nama_pembeli: '-', status: 'belum' });
  await sb.from('layangans').update({ stok: l.stok - 1 }).eq('id', id);
  kirimNotif(l.nama, l.harga, l.stok - 1);
  toast('🛒 Terjual 1 ' + l.nama + ' — ' + rp(l.harga));
  load();
}

let showLunas = false;

async function renderTagihan() {
  const { data } = await sb.from('transaksis').select('*').order('created_at', { ascending: false });
  const semua = data || [];
  const belum = semua.filter(x => x.status == 'belum');
  const sudah = semua.filter(x => x.status == 'lunas');
  $('t-total').innerText = rp(belum.reduce((a, b) => a + b.total, 0));
  $('t-lunas').innerText = rp(sudah.reduce((a, b) => a + b.total, 0));
  $('btn-bayar-semua').style.display = belum.length ? 'block' : 'none';
  $('toggle-lunas-wrap').style.display = sudah.length ? 'block' : 'none';
  $('toggle-lunas-btn').innerText = showLunas ? '🙈 Sembunyikan Riwayat' : '📂 Lihat Riwayat Lunas (' + sudah.length + ')';

  if (!semua.length) {
    $('list-tagihan').innerHTML = '<div class="empty">Belum ada transaksi.</div>';
    return;
  }

  const tampil = showLunas ? semua : belum;
  if (!tampil.length) {
    $('list-tagihan').innerHTML = '<div class="empty">Semua tagihan sudah lunas. &#x1F389;</div>';
    return;
  }

  $('list-tagihan').innerHTML = tampil.map(t => `
    <div class="hutang-card" style="border-left-color:${t.status == 'lunas' ? '#00b894' : '#d63031'}">
      <div class="row">
        <div>
          <div class="nama">${t.nama_pembeli || '-'}</div>
          <div class="sub">${t.layangan_nama} &times; ${t.qty} = ${rp(t.total)}</div>
          <div class="sub" style="font-size:11px;color:#bbb">${new Date(t.created_at).toLocaleDateString('id-ID', { day: 'numeric', month: 'short', year: 'numeric' })}</div>
          ${t.status == 'lunas' && t.paid_at ? `<div class="sub" style="font-size:11px;color:#00b894;margin-top:2px">&#x2714; Dibayar: ${new Date(t.paid_at).toLocaleDateString('id-ID', { day: 'numeric', month: 'short', year: 'numeric' })}</div>` : ''}
        </div>
        ${t.status == 'belum'
          ? `<div style="display:flex;flex-direction:column;gap:6px;align-items:flex-end">
               <button class="lunas-btn" onclick="tandaiLunas(${t.id})">Lunas</button>
               <button onclick="batalTransaksi(${t.id},${t.layangan_id},${t.qty})" style="background:none;border:1px solid #ddd;border-radius:6px;padding:5px 10px;font-size:11px;color:#999;cursor:pointer;font-weight:700">↩ Batal</button>
             </div>`
          : `<span style="color:#00b894;font-weight:700;font-size:13px">&#x2713; Lunas</span>`}
      </div>
    </div>`).join('');
}

function toggleLunas() {
  showLunas = !showLunas;
  renderTagihan();
}

async function bayarSemua() {
  const total = $('t-total').innerText;
  if (!confirm('Tandai semua tagihan (' + total + ') sebagai lunas?')) return;
  await sb.from('transaksis').update({ status: 'lunas', paid_at: new Date().toISOString() }).eq('status', 'belum');
  toast('✅ Semua tagihan lunas!');
  load();
}

async function batalTransaksi(id, layangan_id, qty) {
  if (!confirm('Batalkan transaksi ini?\nStok akan dikembalikan.')) return;
  // Kembalikan stok
  const l = items.find(x => x.id === layangan_id);
  if (l) await sb.from('layangans').update({ stok: l.stok + qty }).eq('id', layangan_id);
  // Hapus transaksi
  await sb.from('transaksis').delete().eq('id', id);
  toast('↩ Transaksi dibatalkan, stok dikembalikan!');
  load();
}

async function tandaiLunas(id) {
  await sb.from('transaksis').update({ status: 'lunas', paid_at: new Date().toISOString() }).eq('id', id);
  toast('✅ Ditandai lunas!');
  load();
}


async function hapusLayangan(id) {
  const l = items.find(x => x.id === id);
  if (!confirm(`Hapus "${l.nama}"?\n\nSemua transaksi terkait juga akan dihapus.`)) return;
  
  // Hapus transaksi dulu
  await sb.from('transaksis').delete().eq('layangan_id', id);
  
  // Baru hapus layangan
  const { error } = await sb.from('layangans').delete().eq('id', id);
  if (error) {
    toast('❌ Gagal hapus: ' + error.message);
  } else {
    toast('✅ Layangan dihapus!');
    load();
  }
}

async function tambahLayangan() {
  const nama = $('s-nama').value.trim();
  const harga = parseInt($('s-harga').value);
  const stok = parseInt($('s-stok').value) || 0;
  if (!nama || !harga) { toast('Isi nama & harga!'); return; }

  // Upload foto jika ada
  let foto_url = null;
  const file = $('s-foto-input').files[0];
  if (file) {
    toast('⏳ Mengupload foto...');
    const ext = file.name.split('.').pop();
    const path = `${Date.now()}.${ext}`;
    const { error } = await sb.storage.from('layangan-photos').upload(path, file, { upsert: true });
    if (!error) {
      const { data } = sb.storage.from('layangan-photos').getPublicUrl(path);
      foto_url = data.publicUrl;
    }
  }

  await sb.from('layangans').insert({ nama, harga, stok, foto_url });
  toast('✅ Layangan ditambah!');
  closeSheet();
  $('s-nama').value = '';
  $('s-harga').value = '';
  $('s-stok').value = '0';
  $('s-foto-input').value = '';
  $('s-foto-preview').innerHTML = '&#x1F4F7;';
  $('s-foto-preview').style.fontSize = '28px';
  load();
}

async function gantiPhoto(id) {
  // Buat input file sementara
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = 'image/*';
  input.onchange = async () => {
    const file = input.files[0];
    if (!file) return;
    toast('⏳ Mengupload foto...');
    const ext = file.name.split('.').pop();
    const path = `${id}_${Date.now()}.${ext}`;
    const { error } = await sb.storage.from('layangan-photos').upload(path, file, { upsert: true });
    if (error) { toast('❌ Gagal upload!'); return; }
    const { data } = sb.storage.from('layangan-photos').getPublicUrl(path);
    await sb.from('layangans').update({ foto_url: data.publicUrl }).eq('id', id);
    toast('✅ Foto diperbarui!');
    load();
  };
  input.click();
}

function showTab(t, el) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('on'));
  document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('on'));
  $('pg-' + t).classList.add('on');
  el.classList.add('on');
  $('fab').style.display = t === 'stok' ? 'flex' : 'none';
  if (t === 'tagihan') renderTagihan();
}

function openSheet() { $('overlay').classList.add('on'); }
function closeSheet() { $('overlay').classList.remove('on'); }

function bukaFoto(url, nama, harga) {
  $('lb-img').src = url;
  $('lb-nama').innerText = nama;
  $('lb-harga').innerText = harga + ' / buah';
  $('lightbox').classList.add('on');
}
function closeLightbox() { $('lightbox').classList.remove('on'); }

$('s-foto-input').addEventListener('change', () => {
  const file = $('s-foto-input').files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    $('s-foto-preview').innerHTML = `<img src="${e.target.result}" style="width:64px;height:64px;object-fit:cover">`;
    $('s-foto-preview').style.fontSize = '0';
  };
  reader.readAsDataURL(file);
});

// PWA
let deferredPrompt = null;
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/layangan/sw.js');
}
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  if (!localStorage.getItem('install-dismissed')) {
    $('install-banner').classList.add('on');
  }
});
$('install-btn').addEventListener('click', async () => {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  const { outcome } = await deferredPrompt.userChoice;
  deferredPrompt = null;
  $('install-banner').classList.remove('on');
  if (outcome === 'accepted') toast('✅ Aplikasi dipasang!');
});
window.addEventListener('appinstalled', () => {
  $('install-banner').classList.remove('on');
});
function tutupBanner() {
  $('install-banner').classList.remove('on');
  localStorage.setItem('install-dismissed', '1');
}
</script>
</body>
</html>
