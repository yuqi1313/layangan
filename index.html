<!DOCTYPE html><html lang="id"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"><title>Catat Layangan</title><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><style>@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap');:root {--primary: #FF6B35;--primary-light: #FF8C5E;--primary-dark: #CC4A1A;--bg: #FFF8F5;--surface: #FFFFFF;--text: #1A1A2E;--text2: #6B6B7B;--border: rgba(255, 107, 53, 0.15);--green: #06D6A0;--green-bg: #E8FBF6;--red: #EF476F;--red-bg: #FEE8EE;--shadow: 0 4px 20px rgba(255, 107, 53, 0.12);}* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }body {font-family: 'Nunito', sans-serif;background: var(--bg);color: var(--text);min-height: 100vh;padding-bottom: 80px;max-width: 500px;margin: 0 auto;position: relative;}#setup-screen {position: fixed;top: 0;left: 50%;transform: translateX(-50%);width: 100%;max-width: 500px;height: 100%;display: flex;flex-direction: column;align-items: center;justify-content: center;padding: 20px;background: linear-gradient(160deg, #FF6B35 0%, #FFD166 100%);z-index: 9999;}.setup-card { background: white; border-radius: 20px; padding: 25px; width: 90%; box-shadow: 0 15px 35px rgba(0,0,0,0.2); }.setup-card input { width: 100%; padding: 12px; margin: 10px 0 20px; border: 1px solid #ddd; border-radius: 10px; }.header { background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%); padding: 20px; color: white; position: sticky; top: 0; z-index: 100; border-radius: 0 0 20px 20px; }.h1 { font-size: 22px; font-weight: 900; }.summary { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 15px 20px; }.sum-card { background: white; padding: 15px; border-radius: 15px; box-shadow: var(--shadow); border: 1px solid var(--border); }.sum-card small { font-size: 11px; color: var(--text2); font-weight: 700; text-transform: uppercase; }.sum-card div { font-size: 18px; font-weight: 900; }.section { display: none; padding: 10px 20px; }.section.active { display: block; }.section-title { font-size: 17px; font-weight: 800; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }.card { background: white; border-radius: 18px; padding: 15px; margin-bottom: 15px; box-shadow: var(--shadow); border: 1px solid var(--border); }.form-group { margin-bottom: 12px; }.form-group label { font-size: 12px; font-weight: 700; color: var(--text2); display: block; margin-bottom: 5px; }.form-group input, .form-group select { width: 100%; padding: 12px; border: 1.5px solid var(--border); border-radius: 10px; font-family: inherit; outline: none; }.btn-primary { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: 800; cursor: pointer; }.item { display: flex; justify-content: space-between; align-items: center; padding: 15px; background: white; border-radius: 12px; margin-bottom: 10px; border: 1px solid var(--border); }.stok-controls { display: flex; align-items: center; gap: 12px; }.btn-s { width: 32px; height: 32px; border-radius: 8px; border: none; font-weight: 900; cursor: pointer; }.btn-plus { background: var(--green-bg); color: var(--green); }.btn-minus { background: var(--red-bg); color: var(--red); }.hutang-box { background: var(--red-bg); border: 1px solid var(--red); padding: 12px; border-radius: 12px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }.btn-lunas { background: var(--green); color: white; border: none; padding: 6px 12px; border-radius: 6px; font-size: 12px; font-weight: 800; }.nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 500px; background: white; display: flex; border-top: 1px solid #eee; z-index: 500; }.nav-item { flex: 1; padding: 15px 0; text-align: center; color: var(--text2); font-size: 11px; font-weight: 700; cursor: pointer; }.nav-item.active { color: var(--primary); }.fab { position: fixed; bottom: 85px; right: 20px; width: 56px; height: 56px; background: var(--primary); color: white; border: none; border-radius: 18px; font-size: 24px; box-shadow: 0 5px 15px rgba(255,107,53,0.4); display: none; align-items: center; justify-content: center; z-index: 400; }.modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; align-items: flex-end; z-index: 1000; }.modal-bg.open { display: flex; }.modal { background: white; width: 100%; border-radius: 20px 20px 0 0; padding: 20px; animation: slide 0.3s ease; }@keyframes slide { from { transform: translateY(100%); } to { transform: translateY(0); } }.toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: #333; color: white; padding: 10px 20px; border-radius: 20px; z-index: 2000; display: none; }</style></head><body><div id="setup-screen" style="display:none"></div><div id="app"><div class="header"><div class="h1">🪁 Catat Layangan</div><div id="h-date" style="font-size: 12px; opacity: 0.8;"></div></div><div class="summary"><div class="sum-card"><small>⏳ Hutang</small><div id="sum-h" style="color:var(--red)">Rp 0</div></div><div class="sum-card"><small>📦 Stok</small><div id="sum-s" style="color:var(--primary)">0</div></div></div><div id="s-stok" class="section active"><div class="section-title">📦 Daftar Stok</div><div id="list-stok"></div></div><div id="s-jual" class="section"><div class="section-title">🛒 Input Jual</div><div class="card"><div class="form-group"><label>Barang</label><select id="j-id"></select></div><div class="form-group"><label>Qty &amp; Harga</label><div style="display:flex; gap:10px"><input type="number" id="j-qty" value="1" style="width:70px"><input type="number" id="j-price" placeholder="Harga Jual"></div></div><div class="form-group"><label>Nama Pembeli</label><input type="text" id="j-note" placeholder="Misal: Budi"></div><button class="btn-primary" onclick="doJual()">💾 Simpan</button></div><div class="section-title">🚩 Belum Bayar</div><div id="list-hutang"></div></div><div id="s-riwayat" class="section"><div class="section-title">📋 Riwayat</div><div id="list-history"></div></div><div id="s-laporan" class="section"><div class="section-title">📊 Laporan</div><div id="laporan-box"></div></div><nav class="nav"><div class="nav-item active" onclick="tab('stok', this)">📦 Stok</div><div class="nav-item" onclick="tab('jual', this)">🛒 Jual</div><div class="nav-item" onclick="tab('riwayat', this)">📋 Riwayat</div><div class="nav-item" onclick="tab('laporan', this)">📊 Laporan</div></nav></div><button id="fab" class="fab" onclick="openM()">+</button><div id="m-add" class="modal-bg"><div class="modal"><h3>Tambah Layangan</h3><br><div class="form-group"><label>Nama</label><input type="text" id="in-nama"></div><div class="form-group"><label>Harga Pokok</label><input type="number" id="in-harga"></div><div class="form-group"><label>Stok</label><input type="number" id="in-stok"></div><button class="btn-primary" onclick="addLayangan()">Simpan</button><button onclick="closeM()" style="width:100%; background:none; border:none; padding:15px; color:#666; font-weight:bold;">Batal</button></div></div><div id="tst" class="toast"></div><script>const URL = "https://xjqkaykrlqtvrbjxgzxm.supabase.co";const KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhqcWtheWtybHF0dnJianhnenhtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzNzg3OTUsImV4cCI6MjA5MTk1NDc5NX0.poSeoWokR5BW7Y_0gmUYEahZ3Cs4Kri_-J5WP1vrT4I";let sb = null;let dataL = [];const id = (x) => document.getElementById(x);const rp = (n) => "Rp " + Math.round(n).toLocaleString('id-ID');window.onload = () => {
  const tryInit = () => {
    if(window.supabase) {
      sb = window.supabase.createClient(URL, KEY);
      start();
    } else {
      setTimeout(tryInit, 100);
    }
  };
  tryInit();
};function initManual() {const u = id('sb-url').value || URL;const k = id('sb-key').value || KEY;sb = window.supabase.createClient(u, k);start();}async function start() {id('setup-screen').style.display = 'none';id('app').style.display = 'block';id('fab').style.display = 'flex';id('h-date').innerText = new Date().toLocaleDateString('id-ID', {day:'numeric', month:'long', year:'numeric'});load();}async function load() {const { data } = await sb.from('layangans').select('*').order('nama');dataL = data || [];renderStok();renderSum();renderJualDrop();const activeTab = document.querySelector('.nav-item.active').innerText.toLowerCase();if(activeTab.includes('jual')) renderHutang();if(activeTab.includes('riwayat')) renderHistory();if(activeTab.includes('laporan')) renderLap();}function renderStok() {id('list-stok').innerHTML = dataL.map(l => `<div class="item"><div><b>${l.nama}</b><br><small>${rp(l.harga)}</small></div><div class="stok-controls"><button class="btn-s btn-minus" onclick="upStok(${l.id},-1)">-</button><b style="width:20px; text-align:center">${l.stok}</b><button class="btn-s btn-plus" onclick="upStok(${l.id},1)">+</button></div></div>`).join('');}async function upStok(i, d) {const item = dataL.find(x => x.id === i);await sb.from('layangans').update({stok: Math.max(0, item.stok + d)}).eq('id', i);load();}async function addLayangan() {const nama = id('in-nama').value;const harga = id('in-harga').value;const stok = id('in-stok').value;if(!nama) return;await sb.from('layangans').insert({nama, harga, stok});closeM();load();}function renderJualDrop() {const s = id('j-id');s.innerHTML = '<option value="">Pilih...</option>' + dataL.map(l => `<option value="${l.id}">${l.nama}</option>`).join('');s.onchange = () => {const l = dataL.find(x => x.id == s.value);if(l) id('j-price').value = l.harga;};}async function doJual() {const i = id('j-id').value;const q = parseInt(id('j-qty').value);const p = parseInt(id('j-price').value);const n = id('j-note').value;const l = dataL.find(x => x.id == i);if(!i || !q) return;await sb.from('transaksis').insert({layangan_id:i, layangan_nama:l.nama, tipe:'jual', qty:q, harga:p, total:q*p, catatan:n, status:'hutang'});await sb.from('layangans').update({stok: l.stok - q}).eq('id', i);msg("Tersimpan!");load();}async function renderHutang() {const { data } = await sb.from('transaksis').select('*').eq('status', 'hutang');id('list-hutang').innerHTML = data?.map(t => `<div class="hutang-box"><div><b>${t.catatan || 'No Name'}</b><br><small>${t.layangan_nama} (${t.qty})</small></div><div style="text-align:right"><b>${rp(t.total)}</b><br><button class="btn-lunas" onclick="bayar(${t.id},${t.total})">Lunas</button></div></div>`).join('') || 'Lunas semua!';}async function bayar(i, t) {await sb.from('transaksis').update({status:'lunas'}).eq('id', i);await sb.from('transaksis').insert({tipe:'bayar', total:t, catatan:'Pelunasan'});load();}async function renderHistory() {const { data } = await sb.from('transaksis').select('*').order('created_at', {ascending:false});id('list-history').innerHTML = data?.map(t => `<div style="border-bottom:1px solid #eee; padding:10px 0; display:flex; justify-content:space-between"><span>${t.tipe=='jual'?'🛒':'💰'} ${t.layangan_nama || t.catatan}</span><b>${rp(t.total)}</b></div>`).join('');}async function renderLap() {const { data } = await sb.from('transaksis').select('*');const jual = data?.filter(x => x.tipe=='jual').reduce((a,b)=>a+b.total,0) || 0;const masuk = data?.filter(x => x.tipe=='bayar').reduce((a,b)=>a+b.total,0) || 0;id('laporan-box').innerHTML = `<div class="card" style="background:var(--primary); color:white">Omzet: ${rp(jual)}</div><div class="card">Uang Masuk: ${rp(masuk)}<br><span style="color:var(--red)">Sisa Piutang: ${rp(jual-masuk)}</span></div>`;}async function renderSum() {const { data } = await sb.from('transaksis').select('total').eq('status','hutang');id('sum-h').innerText = rp(data?.reduce((a,b)=>a+b.total,0) || 0);id('sum-s').innerText = dataL.reduce((a,b)=>a+b.stok,0);}function tab(t, el) {document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));id('s-'+t).classList.add('active');el.classList.add('active');id('fab').style.display = t === 'stok' ? 'flex' : 'none';load();}function openM() { id('m-add').classList.add('open'); }function closeM() { id('m-add').classList.remove('open'); }function msg(m) { const t=id('tst'); t.innerText=m; t.style.display='block'; setTimeout(()=>t.style.display='none', 2000); }</script></body></html>
